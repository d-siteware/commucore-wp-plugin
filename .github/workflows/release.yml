name: Build Release & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create plugin archive
        run: |
          mkdir -p build/commucore
          cp -r plugin/* build/commucore/
          cd build
          zip -r ../commucore.zip commucore/

      - name: Generate checksums
        run: |
          sha256sum commucore.zip > commucore.zip.sha256
          echo "Checksum:"
          cat commucore.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            commucore.zip
            commucore.zip.sha256
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────
  # WordPress.org SVN Deploy
  # Voraussetzungen bevor dieser Job aktiviert wird:
  #   1. Plugin bei wordpress.org eingereicht und genehmigt
  #   2. GitHub Secrets gesetzt:
  #      - SVN_USERNAME  (wordpress.org Benutzername)
  #      - SVN_PASSWORD  (wordpress.org Passwort)
  #   3. Plugin-Slug "commucore" auf wordpress.org reserviert
  #
  # Zum Aktivieren:
  #   - Zeile mit 'if: "false"' entfernen
  #   - SLUG ggf. anpassen falls wordpress.org einen anderen vergibt
  # ─────────────────────────────────────────────────────────────
  deploy-svn:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    needs: build
    if: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to WordPress Plugin Directory
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: commucorename: Build Release & Deploy

